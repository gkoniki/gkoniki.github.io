<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reunião Mad Maze</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0c10;
      --surface: #13141a;
      --border: #22232e;
      --border-light: #2e2f3e;
      --text: #e8e8f0;
      --muted: #55566a;
      --mono: 'DM Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 55% 45% at 15% 25%, rgba(99,179,237,0.07) 0%, transparent 65%),
        radial-gradient(ellipse 45% 55% at 85% 75%, rgba(154,117,234,0.06) 0%, transparent 65%);
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2.5rem 2rem;
      position: relative;
      animation: rise 0.5s cubic-bezier(0.22,1,0.36,1);
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 2rem; right: 2rem;
      height: 2px;
      border-radius: 0 0 4px 4px;
      background: var(--accent-line, linear-gradient(90deg, #63b3ed, #9a75ea));
      transition: background 0.5s;
    }

    .label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: var(--mono);
      margin-bottom: 1.8rem;
    }

    .meeting-line {
      font-size: 1.45rem;
      font-weight: 300;
      line-height: 1.6;
      margin-bottom: 0.5rem;
    }

    .meeting-line strong { font-weight: 700; }

    .time-chip {
      display: inline-block;
      font-family: var(--mono);
      font-size: 1.4rem;
      font-weight: 500;
      padding: 0.1rem 0.55rem;
      border-radius: 8px;
      margin: 0 0.1rem;
    }

    .time-early {
      background: rgba(99,179,237,0.12);
      color: #63b3ed;
      border: 1px solid rgba(99,179,237,0.25);
    }

    .time-late {
      background: rgba(154,117,234,0.12);
      color: #b794f4;
      border: 1px solid rgba(154,117,234,0.25);
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.6rem 0;
    }

    .countdown {
      font-size: 0.85rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #63b3ed;
      animation: blink 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    .dot.purple { background: #b794f4; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .skipped-note {
      margin-top: 1.2rem;
      font-size: 0.78rem;
      color: var(--muted);
      font-family: var(--mono);
    }

    .skipped-note::before { content: '⚠ '; opacity: 0.6; }

    /* ── Schedule dropdown ── */
    .schedule-toggle {
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      user-select: none;
      color: var(--muted);
      font-size: 0.8rem;
      font-family: var(--mono);
      letter-spacing: 0.05em;
      width: fit-content;
      transition: color 0.2s;
    }

    .schedule-toggle:hover { color: var(--text); }

    .toggle-arrow {
      font-size: 0.65rem;
      transition: transform 0.25s;
      display: inline-block;
    }

    .toggle-arrow.open { transform: rotate(90deg); }

    .schedule-list {
      display: none;
      margin-top: 0.8rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .schedule-list.open { display: block; }

    .schedule-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 1rem;
      font-size: 0.82rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .schedule-item:last-child { border-bottom: none; }

    .schedule-item:hover { background: rgba(255,255,255,0.02); }

    .schedule-item.is-next {
      background: rgba(99,179,237,0.04);
    }

    .schedule-item.is-next .s-date { color: var(--text); font-weight: 600; }

    .s-date { color: var(--muted); font-family: var(--mono); font-size: 0.8rem; }
    .s-badge {
      font-family: var(--mono);
      font-size: 0.75rem;
      padding: 0.1rem 0.45rem;
      border-radius: 5px;
    }

    .s-badge.early {
      background: rgba(99,179,237,0.1);
      color: #63b3ed;
      border: 1px solid rgba(99,179,237,0.2);
    }

    .s-badge.late {
      background: rgba(154,117,234,0.1);
      color: #b794f4;
      border: 1px solid rgba(154,117,234,0.2);
    }

    .s-badge.skip {
      background: rgba(255,100,100,0.08);
      color: #f87171;
      border: 1px solid rgba(255,100,100,0.15);
    }

    .s-next-tag {
      font-size: 0.65rem;
      color: #63b3ed;
      font-family: var(--mono);
      opacity: 0.7;
      margin-left: 0.4rem;
    }

    .footer {
      margin-top: 1.5rem;
      font-size: 0.72rem;
      color: var(--muted);
      font-family: var(--mono);
      opacity: 0.4;
      text-align: right;
    }
  </style>
</head>
<body>

<div class="card" id="card">
  <div class="label">◈ Reunião Mad Maze</div>
  <div class="meeting-line" id="mainText">Carregando…</div>
  <div class="divider"></div>
  <div class="countdown" id="countdown"></div>
  <div id="skippedNote"></div>

  <div class="schedule-toggle" id="toggleBtn" onclick="toggleSchedule()">
    <span class="toggle-arrow" id="arrow">▶</span>
    Ver todas as reuniões
  </div>
  <div class="schedule-list" id="scheduleList"></div>

  <div class="footer" id="footer"></div>
</div>

<script>
  // ── CONFIG ──────────────────────────────────────────────────
  // Anchor: 2 Mar 2025 = 18:25. So 9 Mar = 18:00, 16 Mar = 18:25, etc.
  const ANCHOR      = new Date(2025, 2, 2);  // 2 de março de 2025
  const ANCHOR_TIME = "18:25";               // horário nessa data

  const TIME_A = "18:00";
  const TIME_B = "18:25";

  // Segunda-feiras SEM reunião
  const SKIP = [
    new Date(2025, 2, 30), // 30 de março de 2025
  ];

  // Última reunião — não mostrar datas após essa
  const LAST_MEETING = new Date(2025, 6, 6); // 6 de julho de 2025
  // ────────────────────────────────────────────────────────────

  function sameDay(a, b) {
    return a.getFullYear() === b.getFullYear() &&
           a.getMonth()    === b.getMonth()    &&
           a.getDate()     === b.getDate();
  }

  function isSkipped(d) { return SKIP.some(s => sameDay(s, d)); }

  function getMondayOf(date) {
    const d = new Date(date);
    d.setHours(0, 0, 0, 0);
    const day = d.getDay();
    d.setDate(d.getDate() + (day === 0 ? -6 : 1 - day));
    return d;
  }

  function addWeek(d) {
    const n = new Date(d);
    n.setDate(n.getDate() + 7);
    return n;
  }

  // Steps from anchor counting only non-skipped Mondays (forward only needed)
  function stepsFromAnchor(monday) {
    const anchor = getMondayOf(ANCHOR);
    anchor.setHours(0, 0, 0, 0);
    const target = new Date(monday);
    target.setHours(0, 0, 0, 0);

    if (sameDay(anchor, target)) return 0;

    let steps = 0;
    let cursor = new Date(anchor);

    if (target > anchor) {
      while (!sameDay(cursor, target)) {
        if (!isSkipped(cursor)) steps++;
        cursor = addWeek(cursor);
      }
    } else {
      cursor = new Date(anchor);
      while (cursor > target) {
        cursor.setDate(cursor.getDate() - 7);
        if (!isSkipped(cursor)) steps--;
      }
    }
    return steps;
  }

  function timeForMonday(monday) {
    const steps = stepsFromAnchor(monday);
    // Anchor = TIME_B (18:25). 0 steps = TIME_B, 1 step = TIME_A, 2 steps = TIME_B...
    return (steps % 2 === 0) ? TIME_B : TIME_A;
  }

  function formatDatePT(d) {
    return d.toLocaleDateString('pt-BR', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    });
  }

  function formatShortPT(d) {
    return d.toLocaleDateString('pt-BR', {
      day: '2-digit', month: '2-digit', year: 'numeric'
    });
  }

  // Build all Mondays from anchor up to LAST_MEETING
  function buildSchedule() {
    const list = [];
    // start from anchor Monday
    let cursor = getMondayOf(ANCHOR);
    cursor.setHours(0, 0, 0, 0);
    const last = new Date(LAST_MEETING);
    last.setHours(0, 0, 0, 0);

    while (cursor <= last) {
      list.push(new Date(cursor));
      cursor = addWeek(cursor);
    }
    return list;
  }

  // Find the next upcoming Monday (after now, respecting meeting time)
  function findNextMeeting() {
    const now = new Date();
    let candidate = getMondayOf(now);

    if (now.getDay() === 1) {
      const t = timeForMonday(candidate);
      const [h, m] = t.split(':').map(Number);
      const meetingToday = new Date(candidate);
      meetingToday.setHours(h, m, 0, 0);
      if (now > meetingToday) candidate = addWeek(candidate);
    } else {
      candidate = addWeek(candidate);
    }

    // skip no-meeting weeks
    let skippedOver = null;
    while (isSkipped(candidate)) {
      skippedOver = new Date(candidate);
      candidate = addWeek(candidate);
    }

    // check if past last meeting
    const last = new Date(LAST_MEETING); last.setHours(23, 59, 0, 0);
    if (candidate > last) return { candidate: null, skippedOver };

    return { candidate, skippedOver };
  }

  function render() {
    const { candidate, skippedOver } = findNextMeeting();
    const now = new Date();

    // ── Main card ──
    const accentLine = !candidate
      ? 'linear-gradient(90deg, #55566a, #3a3a4a)'
      : (timeForMonday(candidate) === TIME_B
          ? 'linear-gradient(90deg, #9a75ea, #63b3ed)'
          : 'linear-gradient(90deg, #63b3ed, #4fd1c5)');
    document.getElementById('card').style.setProperty('--accent-line', accentLine);

    if (!candidate) {
      document.getElementById('mainText').innerHTML =
        `<strong>O ciclo de reuniões encerrou.</strong><br><span style="font-size:1rem;color:var(--muted)">A última reunião foi em 6 de julho de 2025.</span>`;
      document.getElementById('countdown').innerHTML =
        `<span class="dot" style="background:var(--muted);animation:none"></span> Nenhuma reunião futura`;
    } else {
      const time = timeForMonday(candidate);
      const isLate = time === TIME_B;
      const timeClass = isLate ? 'time-late' : 'time-early';

      document.getElementById('mainText').innerHTML =
        `A próxima reunião de segunda-feira<br>` +
        `<strong>${formatDatePT(candidate)}</strong><br>` +
        `será às <span class="time-chip ${timeClass}">${time}</span>`;

      // Countdown (always shows days + hours + minutes)
      const [h, m] = time.split(':').map(Number);
      const meetingDT = new Date(candidate);
      meetingDT.setHours(h, m, 0, 0);
      const diff = meetingDT - now;
      const cdEl = document.getElementById('countdown');

      if (diff > 0) {
        const days  = Math.floor(diff / 86400000);
        const hours = Math.floor((diff % 86400000) / 3600000);
        const mins  = Math.floor((diff % 3600000)  / 60000);

        let parts = [];
        if (days > 0)  parts.push(`${days} dia${days !== 1 ? 's' : ''}`);
        if (hours > 0) parts.push(`${hours}h`);
        parts.push(`${mins}min`);

        const str = days === 0 && hours === 0 && mins < 5
          ? `em ${mins} minutos — prepare-se!`
          : `em ${parts.join(' e ')}`;

        cdEl.innerHTML = `<span class="dot ${isLate ? 'purple' : ''}"></span> ${str}`;
      } else {
        cdEl.innerHTML = `<span class="dot" style="background:var(--muted);animation:none"></span> Horário da reunião já passou`;
      }
    }

    // Skipped note
    const noteEl = document.getElementById('skippedNote');
    if (skippedOver) {
      const s = skippedOver.toLocaleDateString('pt-BR', { day: 'numeric', month: 'long' });
      noteEl.innerHTML = `<div class="skipped-note">Sem reunião em ${s} — exibindo a semana seguinte</div>`;
    } else {
      noteEl.innerHTML = '';
    }

    // ── Schedule list ──
    renderSchedule(candidate);

    document.getElementById('footer').textContent =
      `atualizado às ${now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}`;
  }

  function renderSchedule(nextCandidate) {
    const allMondays = buildSchedule();
    const listEl = document.getElementById('scheduleList');

    listEl.innerHTML = allMondays.map(monday => {
      const skipped = isSkipped(monday);
      const isNext  = nextCandidate && sameDay(monday, nextCandidate);
      const time    = skipped ? null : timeForMonday(monday);
      const isLate  = time === TIME_B;

      const dateStr = formatShortPT(monday) + (isNext ? `<span class="s-next-tag">← próxima</span>` : '');
      const badge   = skipped
        ? `<span class="s-badge skip">sem reunião</span>`
        : `<span class="s-badge ${isLate ? 'late' : 'early'}">${time}</span>`;

      return `<div class="schedule-item ${isNext ? 'is-next' : ''}">
        <span class="s-date">${dateStr}</span>
        ${badge}
      </div>`;
    }).join('');
  }

  function toggleSchedule() {
    const list  = document.getElementById('scheduleList');
    const arrow = document.getElementById('arrow');
    const open  = list.classList.toggle('open');
    arrow.classList.toggle('open', open);
  }

  render();
  setInterval(render, 60 * 1000);
</script>

</body>
</html>
